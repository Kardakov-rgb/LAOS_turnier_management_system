<!DOCTYPE html>

<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAOS 2.0 - Wetten</title>
    <link rel="icon" type="image/x-icon" href="../global/favicon.png">
    <!-- Globale CSS-Datei -->
    <link rel="stylesheet" href="../global/global.css">
    <link rel="stylesheet" href="./wetten.css">
</head>

<body>

    <div class="page-container">

        <!-- Header-Bereich mit Navigation -->

        <header class="main-header">

            <div class="logo-container">
                <img src="../global/favicon.png" alt="Logo" class="site-logo">
                <h1 class="site-title">LAOS 2.0</h1>

            </div>

            <nav class="main-nav">

                <ul class="nav-list">

                    <li class="nav-item"><a href="../index.html" class="nav-link">Startseite</a></li>
                    <li class="nav-item"><a href="../teams/teams.html" class="nav-link">Teams</a></li>
                    <li class="nav-item"><a href="../vorrunde/vorrunde.html" class="nav-link">Vorrunde</a></li>
                    <li class="nav-item"><a href="../korunde/ko-runde.html" class="nav-link">KO-Runde</a></li>
                    <li class="nav-item"><a href="../gegner/gegner.html" class="nav-link ">Gegner-Übersicht</a></li>
                    <li class="nav-item"><a href="../statistik/statistik.html" class="nav-link">Statistik</a></li>
                    <li class="nav-item"><a href="../wetten/wetten.html" class="nav-link active">Wetten</a></li>
                    <li class="nav-item"><a href="../wetten/wetten-display.html" class="nav-link">Wetten Display</a></li>

                </ul>

            </nav>

        </header>



        <!-- Hauptinhalt der Seite -->

        <main class="main-content">

            <div class="wetten-container">

<!-- Neues Grid-Layout für den oberen Bereich -->
<div class="wetten-top-grid">
    <!-- Linke Spalte: Statistik-Container (verschoben aus team-bets-section) -->
    <div class="wetten-top-left">
        <div class="total-stats-container">
            <div class="total-stats">
                <div class="total-stat-block">
                    <div class="total-stat-value" id="totalBetsCount">0</div>
                    <div class="total-stat-label">Wetten gesamt</div>
                </div>
                <div class="total-stat-block">
                    <div class="total-stat-value" id="totalBetsAmount">0,00 €</div>
                    <div class="total-stat-label">Gesamteinsatz</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Rechte Spalte: Wettformular -->
    <div class="wetten-top-right">
        <div class="betting-form-section">
            <div class="betting-form-container">
                <form id="bettingForm" class="betting-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="betterName">Name des Wettenden:</label>
                            <input type="text" id="betterName" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="betAmount">Wetteinsatz (€):</label>
                            <input type="number" id="betAmount" class="form-input" min="1" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label for="teamSelect">Team:</label>
                            <select id="teamSelect" class="form-input" required>
                                <option value="" disabled selected>Team auswählen</option>
                                <!-- Wird dynamisch durch JavaScript gefüllt -->
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="placeBetBtn" class="btn btn-primary">🎰</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Finalisten-Anzeige (unverändert) -->
<div class="finalists-section">
    <div id="finalistsContainer" class="finalists-container">
        <!-- Wird dynamisch durch JavaScript gefüllt -->
    </div>
</div>

<!-- Team-Wetten-Tabellen (ohne den total-stats-container) -->
<div class="team-bets-section">
    <div id="teamBetsContainer" class="team-bets-container">
        <!-- Wird dynamisch durch JavaScript gefüllt -->
    </div>
</div>

<!-- Aktionen (unverändert) -->
<div class="wetten-header">
    <div class="wetten-actions">
        <button id="exportDataBtn" class="btn btn-secondary">📤</button>
        <button id="resetBetsBtn" class="btn btn-danger">🔄</button>
    </div>
</div>

<!-- Status-Container (unverändert) -->
<div id="statusContainer" class="status-container"></div>

            </div>

        </main>

    </div>

<div class="status-display">
    <div id="system-status" class="system-status">
        <div class="status-icons"> 
            <span id="connection-icon" class="status-icon"></span>
            <span id="user-icon" class="status-icon"></span>
        </div>
        <span id="pending-updates" class="pending-badge"></span>
        
        <!-- Dropdown-Menü für Status-Details -->
        <div class="status-menu">
            <div id="connection-status-text" class="status-item"></div>
            <div id="user-status-text" class="status-item"></div>
            <button id="status-login-btn" class="menu-btn">Anmelden</button>
            <button id="logout-btn" class="menu-btn">Abmelden</button>
        </div>
    </div>
    <footer class="overlay-footer">
        <img src="../global/Footer.png" alt="Footer">
    </footer>

</div>

    <!-- JavaScript -->

    <script type="module" src="./wetten.js"></script>

    <!-- Füge diese Zeilen vor deinen eigenen Skripten hinzu -->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.6.0/firebase-database.js"></script>
    <script type="module" src="../global/firebase-config.js"></script>

</body>

</html>
